<html lang="nl">
<head>

    <title>CelestialElora – Tamara Esseveld</title>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --dark-bg: #fdfaf5;   
            --card: #ffffff;      
            --gold: #b8964d;
            --text-main: #1a1a1a; 
            --grey: #5a5a5a;
            --font-display: 'Cinzel', serif;
            --font-body: 'Cormorant Garamond', serif;
        }
        html { scroll-behavior: smooth; }
        body { background: var(--dark-bg); color: var(--text-main); font-family: var(--font-body); font-size: 18px; line-height: 1.6; overflow-x: hidden; }

        /* NAVBAR */
        nav { 
            position: fixed; top: 0; left: 0; right: 0; z-index: 100; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 40px; background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(20px); border-bottom: 2px solid var(--gold); 
        }
        .logo { font-family: var(--font-display); font-size: 18px; letter-spacing: 0.3em; text-decoration: none; color: var(--text-main); text-transform: uppercase; }
        
        .nav-links { display: flex; gap: 20px; list-style: none; }
        .nav-links a { font-family: var(--font-display); font-size: 11px; text-decoration: none; color: var(--text-main); text-transform: uppercase; transition: 0.3s; }
        .nav-links a:hover { color: var(--gold); }

        /* HERO */
        #hero { padding: 200px 20px 100px; text-align: center; background: var(--dark-bg); min-height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .hero-label { font-family: var(--font-display); font-size: 12px; color: var(--gold); letter-spacing: 0.4em; text-transform: uppercase; margin-bottom: 20px; }
        .hero-name { font-size: clamp(35px, 8vw, 65px); font-weight: 300; margin-bottom: 20px; text-transform: uppercase; line-height: 1.1; }
        .hero-name em { font-style: italic; color: var(--gold); font-weight: 400; }
        .hero-tagline { max-width: 700px; margin: 0 auto 40px; font-size: 22px; font-style: italic; color: var(--grey); }

        /* OVER MIJ SECTIE */
        #over { padding: 100px 40px; max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; }
        
        /* De container voor de foto ien het zwevende goud frame */
        .over-visual { position: relative; display: flex; justify-content: center; align-items: center; width: 100%; max-width: 380px; margin: 0 auto; }
        
        /* Het nieuwe zwevende gouden frame achter de foto */
        .over-visual::after {
            content: '';
            position: absolute;
            top: 20px;
            left: 20px;
            width: 100%;
            height: 100%;
            border: 1px solid var(--gold);
            z-index: 1;
            pointer-events: none;
        }

        /* Luxe Rechthoekig Frame voor de foto zelf */
        .portrait-frame { 
            width: 100%; 
            height: auto; 
            aspect-ratio: 3 / 4; 
            object-fit: cover; 
            z-index: 2; 
            border: 1px solid var(--gold); 
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15); 
            background: #fff;
            position: relative;
        }
        
        /* De heilige geometrie aangepast qua positie */
        .sacred-geo { position: absolute; width: 480px; height: 480px; opacity: 0.15; animation: rotate 60s linear infinite; z-index: 0; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .over-content { text-align: left; }
